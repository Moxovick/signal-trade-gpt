services:
  bot:
    build: ./bot
    container_name: signal-trade-bot
    restart: unless-stopped
    env_file:
      - ./bot/.env
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os; open('data/bot.pid').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bot-data:
